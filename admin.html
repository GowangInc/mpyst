<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mPyst Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f17;
      --panel: #111827;
      --gold: #d4af37;
      --text: #e5e7eb;
      --text-secondary: #9ca3af;
      --danger: #ef4444;
      --success: #22c55e;
      --info: #3b82f6;
      --border: rgba(212, 175, 55, 0.25);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    h1, h2, h3 { font-family: 'Cinzel', serif; color: var(--gold); margin: 0 0 12px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .login-card, .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .hidden { display: none !important; }
    label { display: block; margin: 12px 0 6px; color: var(--text-secondary); font-size: 0.9rem; }
    input, select {
      width: 100%;
      padding: 10px 12px;
      background: #0d131f;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
    }
    button {
      background: var(--gold);
      color: #0d131f;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    button.secondary { background: transparent; border: 1px solid var(--border); color: var(--gold); }
    button.danger { background: var(--danger); color: white; }
    button:hover { filter: brightness(1.1); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .competition-card {
      background: #0d131f;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .competition-card:hover { border-color: var(--gold); }
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge.active { background: rgba(34, 197, 94, 0.15); color: var(--success); }
    .badge.inactive { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
    th { color: var(--gold); font-weight: 600; }
    .progress-bar {
      height: 8px;
      background: #1f2937;
      border-radius: 4px;
      overflow: hidden;
      width: 120px;
    }
    .progress-bar > div { height: 100%; background: var(--gold); }
    .event-log {
      max-height: 300px;
      overflow-y: auto;
      background: #0d131f;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-size: 0.85rem;
    }
    .event-row { margin-bottom: 8px; color: var(--text-secondary); }
    .event-row strong { color: var(--text); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .back-link { color: var(--gold); cursor: pointer; text-decoration: underline; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--panel);
      border: 1px solid var(--gold);
      padding: 12px 18px;
      border-radius: 6px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>mPyst Admin</h1>
    </div>

    <div id="login-view">
      <div class="login-card" style="max-width: 400px; margin: 60px auto;">
        <h2>Admin Login</h2>
        <p style="color: var(--text-secondary);">Enter the admin password to manage competitions.</p>
        <label for="admin-password">Password</label>
        <input type="password" id="admin-password" placeholder="Admin password">
        <button id="login-btn">Login</button>
        <p id="login-error" style="color: var(--danger); margin-top: 12px;"></p>
      </div>
    </div>

    <div id="dashboard-view" class="hidden">
      <div class="panel">
        <h2>Create Competition</h2>
        <div class="grid" style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));">
          <div>
            <label for="new-code">Competition Code</label>
            <input type="text" id="new-code" placeholder="e.g. YEAR7A">
          </div>
          <div>
            <label for="new-name">Display Name</label>
            <input type="text" id="new-name" placeholder="e.g. Year 7 Class A">
          </div>
          <div>
            <label for="new-mode">Mode</label>
            <select id="new-mode">
              <option value="competition">Competition (race)</option>
              <option value="coop">Cooperative</option>
            </select>
          </div>
          <div>
            <label for="new-max">Max Players (1-20)</label>
            <input type="number" id="new-max" min="1" max="20" value="20">
          </div>
        </div>
        <button id="create-btn">Create Competition</button>
      </div>

      <div class="panel">
        <h2>Competitions</h2>
        <div id="competitions-list" class="grid"></div>
      </div>
    </div>

    <div id="detail-view" class="hidden">
      <p class="back-link" id="back-btn">← Back to competitions</p>
      <div class="panel">
        <h2 id="detail-title">Competition</h2>
        <p id="detail-meta" style="color: var(--text-secondary);"></p>
        <div class="actions">
          <button id="toggle-btn" class="secondary">Toggle Active</button>
          <button id="reset-btn" class="secondary">Reset Progress</button>
          <button id="delete-btn" class="danger">Delete</button>
        </div>
      </div>

      <div class="panel">
        <h3>Leaderboard</h3>
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Name</th>
              <th>Progress</th>
              <th>Status</th>
              <th>Last Active</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>

      <div class="panel">
        <h3>Recent Events</h3>
        <div id="events-log" class="event-log"></div>
      </div>
    </div>
  </div>

  <script type="module">
    let adminToken = localStorage.getItem('mpyst_admin_token') || '';
    const loginView = document.getElementById('login-view');
    const dashboardView = document.getElementById('dashboard-view');
    const detailView = document.getElementById('detail-view');

    const api = async (path, options = {}) => {
      const res = await fetch(path, {
        ...options,
        headers: {
          'Authorization': `Bearer ${adminToken}`,
          'Content-Type': 'application/json',
          ...(options.headers || {})
        }
      });
      if (res.status === 401) {
        adminToken = '';
        localStorage.removeItem('mpyst_admin_token');
        showLogin();
        throw new Error('Session expired');
      }
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Request failed' }));
        throw new Error(err.error || 'Request failed');
      }
      return res.json();
    };

    function showLogin() {
      loginView.classList.remove('hidden');
      dashboardView.classList.add('hidden');
      detailView.classList.add('hidden');
    }

    function showDashboard() {
      loginView.classList.add('hidden');
      dashboardView.classList.remove('hidden');
      detailView.classList.add('hidden');
      loadCompetitions();
    }

    function showDetail() {
      loginView.classList.add('hidden');
      dashboardView.classList.add('hidden');
      detailView.classList.remove('hidden');
    }

    document.getElementById('login-btn').addEventListener('click', async () => {
      const password = document.getElementById('admin-password').value;
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        adminToken = data.token;
        localStorage.setItem('mpyst_admin_token', adminToken);
        showDashboard();
      } catch (e) {
        document.getElementById('login-error').textContent = e.message;
      }
    });

    document.getElementById('create-btn').addEventListener('click', async () => {
      const code = document.getElementById('new-code').value.trim();
      const name = document.getElementById('new-name').value.trim();
      const mode = document.getElementById('new-mode').value;
      const maxPlayers = document.getElementById('new-max').value;
      if (!code || !name) return toast('Code and name are required', 'error');
      try {
        await api('/api/admin/competitions', {
          method: 'POST',
          body: JSON.stringify({ code, name, mode, maxPlayers })
        });
        toast('Competition created');
        document.getElementById('new-code').value = '';
        document.getElementById('new-name').value = '';
        loadCompetitions();
      } catch (e) {
        toast(e.message, 'error');
      }
    });

    async function loadCompetitions() {
      try {
        const list = await api('/api/admin/competitions');
        const container = document.getElementById('competitions-list');
        container.innerHTML = '';
        list.forEach(c => {
          const card = document.createElement('div');
          card.className = 'competition-card';
          card.innerHTML = `
            <h3>${escapeHtml(c.name)}</h3>
            <p style="margin:4px 0; color:var(--text-secondary);">Code: <strong>${escapeHtml(c.code)}</strong></p>
            <p style="margin:4px 0; color:var(--text-secondary);">Mode: ${escapeHtml(c.mode)} · Players: ${c.playerCount}/${c.max_players}</p>
            <span class="badge ${c.active ? 'active' : 'inactive'}">${c.active ? 'Active' : 'Inactive'}</span>
          `;
          card.addEventListener('click', () => openCompetition(c.code));
          container.appendChild(card);
        });
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    let currentCode = null;
    let detailInterval = null;

    async function openCompetition(code) {
      currentCode = code;
      showDetail();
      await refreshDetail();
      if (detailInterval) clearInterval(detailInterval);
      detailInterval = setInterval(refreshDetail, 5000);
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      if (detailInterval) clearInterval(detailInterval);
      currentCode = null;
      showDashboard();
    });

    async function refreshDetail() {
      if (!currentCode) return;
      try {
        const data = await api(`/api/admin/competitions/${currentCode}`);
        const c = data.competition;
        document.getElementById('detail-title').textContent = c.name;
        document.getElementById('detail-meta').textContent = `Code: ${c.code} · Mode: ${c.mode} · Max players: ${c.max_players} · ${c.active ? 'Active' : 'Inactive'}`;

        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = '';
        data.leaderboard.forEach((p, idx) => {
          const progress = calculateProgress(p.progress);
          const status = p.completedAt ? '✅ Finished' : (progress > 0 ? '🧩 Playing' : '⏳ Joined');
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${idx + 1}</td>
            <td><span style="color:${escapeHtml(p.color)};">●</span> ${escapeHtml(p.name)}</td>
            <td>
              <div class="progress-bar"><div style="width:${progress}%"></div></div>
              <span style="font-size:0.75rem; color:var(--text-secondary);">${progress}%</span>
            </td>
            <td>${status}</td>
            <td>${formatTime(p.lastActiveAt)}</td>
          `;
          tbody.appendChild(row);
        });

        const log = document.getElementById('events-log');
        log.innerHTML = '';
        if (data.events.length === 0) {
          log.innerHTML = '<div class="event-row">No events yet.</div>';
        } else {
          data.events.forEach(e => {
            const div = document.createElement('div');
            div.className = 'event-row';
            const player = e.player_name || 'Unknown';
            div.innerHTML = `<strong>${formatTime(e.created_at)}</strong> — ${escapeHtml(player)} ${escapeHtml(e.event_type)}`;
            log.appendChild(div);
          });
        }
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    document.getElementById('toggle-btn').addEventListener('click', async () => {
      if (!currentCode) return;
      try {
        await api(`/api/admin/competitions/${currentCode}/toggle`, { method: 'POST' });
        toast('Competition toggled');
        refreshDetail();
      } catch (e) { toast(e.message, 'error'); }
    });

    document.getElementById('reset-btn').addEventListener('click', async () => {
      if (!currentCode || !confirm('Reset all player progress for this competition?')) return;
      try {
        await api(`/api/admin/competitions/${currentCode}/reset`, { method: 'POST' });
        toast('Competition reset');
        refreshDetail();
      } catch (e) { toast(e.message, 'error'); }
    });

    document.getElementById('delete-btn').addEventListener('click', async () => {
      if (!currentCode || !confirm('Delete this competition and all its players permanently?')) return;
      try {
        await api(`/api/admin/competitions/${currentCode}`, { method: 'DELETE' });
        toast('Competition deleted');
        if (detailInterval) clearInterval(detailInterval);
        currentCode = null;
        showDashboard();
      } catch (e) { toast(e.message, 'error'); }
    });

    function calculateProgress(progress) {
      if (!progress || typeof progress !== 'object') return 0;
      const checks = [
        progress.bridgeRaised,
        progress.elevatorPowered,
        progress.generatorSolved,
        progress.spaceshipSolved,
        progress.shrineSolved,
        progress.cavernSolved,
        progress.markerSwitchesRaised,
        progress.imagerSolved,
        progress.starChartSolved,
        progress.cabinSafeOpened,
        progress.shipMarkersAligned,
        progress.mystBookRevealed
      ];
      const solved = checks.filter(Boolean).length;
      return Math.round((solved / checks.length) * 100);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    function formatTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleString();
    }

    function toast(message, type = 'info') {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = message;
      t.style.borderColor = type === 'error' ? 'var(--danger)' : 'var(--gold)';
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // Auto-login if token exists
    if (adminToken) {
      showDashboard();
    } else {
      showLogin();
    }
  </script>
</body>
</html>
